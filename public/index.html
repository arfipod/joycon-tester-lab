<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Joy-Con HID Tester</title>
    <link rel="icon" href="./favicon.svg" type="image/svg+xml" />
    <meta name="description" content="Local Joy-Con HID vibration tester." />
    <link rel="stylesheet" href="./styles.css" />
  </head>
  <body>
    <main class="shell">
      <header class="header">
        <h1>Joy-Con HID Tester</h1>
        <p>Local test panel for vibrating the left and right Joy-Con independently.</p>
      </header>

      <section class="panel status-panel">
        <div>
          <span class="label">Local API</span>
          <strong id="apiStatus">Checking...</strong>
        </div>
        <div>
          <span class="label">Left</span>
          <strong id="leftStatus">Checking...</strong>
        </div>
        <div>
          <span class="label">Right</span>
          <strong id="rightStatus">Checking...</strong>
        </div>
      </section>

      <section class="panel">
        <div class="controls">
          <label>
            Duration
            <input id="durationMs" type="number" value="450" min="20" max="3000" step="10" />
          </label>
          <label>
            Intensity
            <select id="intensity">
              <option value="low">Low</option>
              <option value="medium">Medium</option>
              <option value="high" selected>High</option>
            </select>
          </label>
        </div>

        <div class="button-row">
          <button id="leftBtn" type="button">Left</button>
          <button id="rightBtn" type="button">Right</button>
          <button id="bothBtn" type="button" class="secondary">Both</button>
          <button id="stopBtn" type="button" class="danger">Stop</button>
          <button id="refreshBtn" type="button" class="secondary">Refresh</button>
        </div>
      </section>

      <section class="panel">
        <div class="log-header">
          <h2>Log</h2>
          <button id="clearLogBtn" type="button" class="secondary">Clear</button>
        </div>
        <pre id="log" class="log" aria-live="polite"></pre>
      </section>
    </main>

    <script type="module" src="./main.js"></script>
  </body>
</html>
